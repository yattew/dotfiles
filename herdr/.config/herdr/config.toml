onboarding = false
[theme]
name = "rose-pine"

auto_switch = false
[keys]
prefix = "ctrl+a"
focus_pane_left = "prefix+h"
focus_pane_down = "prefix+j"
focus_pane_up = "prefix+k"
focus_pane_right = "prefix+l"
split_vertical = "prefix+%"
split_horizontal = "prefix+\""
new_tab = "prefix+c"
next_tab = "prefix+n"
previous_tab = "prefix+p"
goto = "prefix+a"

# Direct agent switching (without menu)
next_agent = "ctrl+shift+j"
previous_agent = "ctrl+shift+k"

# Navigate mode (Prefix + W or G) movement
navigate_workspace_up = "k"
navigate_workspace_down = "j"

[experimental]
switch_ascii_input_source_in_prefix = true
pane_history = true


[ui.toast]
delivery = "system"

[ui]
show_agent_labels_on_pane_borders = true

agent_panel_sort = "spaces"
[session]
resume_agents_on_restore = true

[[keys.command]]
key = "ctrl+h"
type = "pane"
command = "herdr-navigator left"
description = "smart navigate left"

[[keys.command]]
key = "ctrl+j"
type = "pane"
command = "herdr-navigator down"
description = "smart navigate down"

[[keys.command]]
key = "ctrl+k"
type = "pane"
command = "herdr-navigator up"
description = "smart navigate up"

[[keys.command]]
key = "ctrl+l"
type = "pane"
command = "herdr-navigator right"
description = "smart navigate right"

